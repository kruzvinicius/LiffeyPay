spring.application.name=LiffeyPay

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/liffeypay
spring.datasource.username=${DB_USERNAME:liffeypay}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# External authorization
app.authorization.url=${AUTHORIZATION_URL:https://run.mocky.io/v3/5794d450-d2e2-4412-8131-73d0293ac1cc}
app.authorization.timeout-ms=${AUTHORIZATION_TIMEOUT_MS:3000}

# JWT  (override JWT_SECRET env var in production — min 32 chars for HS256)
app.jwt.secret=${JWT_SECRET:liffeypay-dev-secret-key-min-32-chars!!}
app.jwt.expiration-ms=86400000
